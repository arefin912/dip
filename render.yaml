services:
  - type: web
    name: tms-website
    env: docker
    branch: main
    dockerfilePath: Dockerfile
    plan: free
    autoDeploy: true
    envVars:
      - key: DB_HOST
        value: localhost # Replace with your database host or use DATABASE_URL instead
      - key: DB_USER
        value: root
      - key: DB_PASS
        value: ""
      - key: DB_NAME
        value: tms_database
      - key: DATABASE_URL
        value: "" # Optional: mysql://user:pass@host:port/database
      - key: STRIPE_SECRET_KEY
        value: ""
      - key: STRIPE_PUBLISHABLE_KEY
        value: ""
